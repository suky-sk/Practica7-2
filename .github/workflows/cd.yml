# =============================================================
# WORKFLOW DE DESPLIEGUE CONTINUO (CD)
# =============================================================
# Este workflow despliega la web en GitHub Pages automáticamente
# cuando se fusiona código en la rama principal.
#
# TODO: Completa las líneas marcadas con ____ para que funcione.
# =============================================================

name: CD - Despliegue a GitHub Pages

# TODO 1: Sustituye ____ por el evento correcto.
# Pregunta: Cuando fusionas un PR, ¿qué evento se produce en la rama main?
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      # TODO 2: Sustituye ____ por el permiso correcto.
      # El workflow necesita CREAR la rama gh-pages.
      contents: write
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Desplegar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # TODO 3: Sustituye ____ por el directorio que contiene los archivos a publicar.
          # PISTA: Los archivos (index.html, style.css) están en la raíz del proyecto.
          # ¿Cómo se referencia el directorio actual en Linux?
          publish_dir: .
          publish_branch: gh-pages
